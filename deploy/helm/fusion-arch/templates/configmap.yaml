{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fusion-arch.componentFullname" (dict "root" $root "name" $name) }}-config
  labels:
    {{- include "fusion-arch.labels" (dict "root" $root "name" $name) | nindent 4 }}
data:
  {{- range $key, $value := $root.Values.global.commonEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if eq $name "orchestration" }}
  REGISTRY_BASE_URL: {{ printf "http://%s:%v" (include "fusion-arch.componentFullname" (dict "root" $root "name" "registry")) (index $root.Values.services "registry" "port") | quote }}
  EXECUTION_BASE_URL: {{ printf "http://%s:%v" (include "fusion-arch.componentFullname" (dict "root" $root "name" "execution")) (index $root.Values.services "execution" "port") | quote }}
  {{- end }}
  {{- if eq $name "execution" }}
  RECRUITING_MCP_BASE_URL: {{ printf "http://%s:%v" (include "fusion-arch.componentFullname" (dict "root" $root "name" "mcp")) (index $root.Values.services "mcp" "port") | quote }}
  {{- end }}
  {{- range $key, $value := $svc.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
---
{{- end }}
{{- end }}

