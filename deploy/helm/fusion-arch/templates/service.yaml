{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fusion-arch.componentFullname" (dict "root" $root "name" $name) }}
  labels:
    {{- include "fusion-arch.labels" (dict "root" $root "name" $name) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "fusion-arch.selectorLabels" (dict "root" $root "name" $name) | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ $svc.port }}
      targetPort: http
---
{{- end }}
{{- end }}

