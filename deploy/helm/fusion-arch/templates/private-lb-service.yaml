{{- $root := . -}}
{{- $svc := index .Values.services "orchestration" -}}
{{- if and $svc.enabled $svc.privateLoadBalancer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fusion-arch.componentFullname" (dict "root" $root "name" "orchestration") }}-private-lb
  labels:
    {{- include "fusion-arch.labels" (dict "root" $root "name" "orchestration") | nindent 4 }}
  annotations:
    {{- toYaml $svc.privateLoadBalancer.annotations | nindent 4 }}
spec:
  type: LoadBalancer
  selector:
    {{- include "fusion-arch.selectorLabels" (dict "root" $root "name" "orchestration") | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
{{- end }}

