spring:
  datasource:
    url: jdbc:h2:mem:recruiting;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

platform:
  ai:
    api-key: ${OPENAI_MODEL:"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"}
    base-url: https://integrate.api.nvidia.com/v1
    model-name: ${OPENAI_MODEL:openai/gpt-oss-120b}
    temperature: 0.2
