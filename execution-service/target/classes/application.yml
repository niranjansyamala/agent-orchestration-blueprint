server:
  port: 8081

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5431/execution}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

platform:
  ai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model-name: ${OPENAI_MODEL:gpt-4.1-mini}
    temperature: 0.2
  security:
    issuer: ${INTERNAL_JWT_ISSUER:recruiting-platform}
    secret: ${INTERNAL_JWT_SECRET:changeit-changeit-changeit-changeit}
    expected-audience: execution-service
    ttl-seconds: 300
    service-name: execution-service
  mcp:
    base-url: ${RECRUITING_MCP_BASE_URL:http://localhost:8083}
    endpoint: ${RECRUITING_MCP_ENDPOINT:/mcp}
    audience: recruiting-mcp-server
  tool-selection:
    max-visible-tools: ${TOOL_SELECTION_MAX_VISIBLE_TOOLS:5}
