server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5431/orchestration}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

platform:
  ai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model-name: ${OPENAI_MODEL:gpt-4.1-mini}
    temperature: 0.2
  security:
    issuer: ${INTERNAL_JWT_ISSUER:recruiting-platform}
    secret: ${INTERNAL_JWT_SECRET:changeit-changeit-changeit-changeit}
    ttl-seconds: 300
    service-name: orchestration-service
  services:
    registry-base-url: ${REGISTRY_BASE_URL:http://localhost:8082}
    execution-base-url: ${EXECUTION_BASE_URL:http://localhost:8081}
