server:
  port: 8082

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5431/registry}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

platform:
  security:
    issuer: ${INTERNAL_JWT_ISSUER:recruiting-platform}
    secret: ${INTERNAL_JWT_SECRET:changeit-changeit-changeit-changeit}
    expected-audience: registry-service
