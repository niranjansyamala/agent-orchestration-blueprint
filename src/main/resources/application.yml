spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5431/recruiting}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

platform:
  ai:
    api-key: ${OPENAI_MODEL:"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"}
    base-url: https://integrate.api.nvidia.com/v1
    model-name: ${OPENAI_MODEL:openai/gpt-oss-120b}
    temperature: 0.2
